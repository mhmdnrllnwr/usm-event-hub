services:
  mongodb:
    image: mongo:latest
    container_name: event_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./api
    container_name: event_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    # --- LIVE RELOAD SETUP ---
    volumes:
      - ./api:/app               # Mount the entire api folder to /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload #
    # -------------------------
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
  
  bot:
    build: ./bot
    container_name: event_bot
    env_file:
      - .env
    depends_on:
      - api
    # --- LIVE RELOAD SETUP ---
    volumes:
      - ./bot:/app               # Sync bot code for instant updates
    # If your bot script is named main.py, ensure it runs directly
    command: python main.py      #
    # -------------------------

volumes:
  mongo_data: